name: 'publish'

on:
  workflow_dispatch:

# This workflow will trigger on each push to the `release` branch to create or update a GitHub release, build your app, and upload the artifacts to the release.

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          #- platform: 'macos-latest' # for Arm based macs (M1 and above).
          #  args: '--target aarch64-apple-darwin'
          #- platform: 'macos-latest' # for Intel based macs.
          #  args: '--target x86_64-apple-darwin'
          #- platform: 'ubuntu-22.04'
          #  container: kalilinux/kali-rolling
          #  args: ''
          - platform: 'windows-2025'
            args: ''
            
    runs-on: ${{ matrix.platform }}
    
    container: ${{ matrix.container }}
  

    steps:
      - name: Install common build deps
        if: runner.os == 'Linux'
        run: apt-get update && apt-get install -y curl build-essential pkg-config libssl-dev

      - uses: actions/checkout@v4
      
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          # cache: 'pnpm'
          

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
        
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: 'openitools'
        
      - name: Cache vcpkg
        if: runner.os == 'Windows'
        uses: actions/cache@v3
        with:
          path: C:/vcpkg/installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('**/vcpkg.json') }}
      - name: Install OpenSSL + libimobiledevice
        if: runner.os == 'Windows'
        run: |
          git clone https://github.com/microsoft/vcpkg C:\vcpkg || echo "already cloned"
          C:\vcpkg\bootstrap-vcpkg.bat
          # C:\vcpkg\vcpkg install openssl:x64-windows-static
          # C:\vcpkg\vcpkg install libimobiledevice:x64-windows
          C:\vcpkg\vcpkg install libplist:x64-windows
          
          # echo "OPENSSL_DIR=C:\vcpkg\installed\x64-windows-static" >> $env:GITHUB_ENV
          # echo "OPENSSL_LIB_DIR=C:\vcpkg\installed\x64-windows-static\lib" >> $env:GITHUB_ENV
          # echo "OPENSSL_INCLUDE_DIR=C:\vcpkg\installed\x64-windows-static\include" >> $env:GITHUB_ENV
          
          
          # Ensure DLLs can be found at runtime
          # echo "C:\vcpkg\installed\x64-windows\bin" >> $env:GITHUB_PATH
          
          # echo "C:\vcpkg\installed\x64-windows-static\bin" >> $env:GITHUB_PATH
          
          # echo "CARGO_FEATURE_VENDORED=1" >> $env:GITHUB_ENV
          - name: Install MSYS2 + autotools

          choco install msys2 -y
          refreshenv
          
          # Update MSYS2 package database and core system packages
          C:\msys64\usr\bin\bash.exe -lc "pacman -Syuu --noconfirm"

          # Install build essentials + autotools explicitly
          C:\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm base-devel autoconf automake libtool mingw-w64-x86_64-toolchain mingw-w64-x86_64-pkg-config"

          # Add MSYS2 / MinGW paths globally to PATH
          echo "C:\\msys64\\usr\\bin" >> $env:GITHUB_PATH
          echo "C:\\msys64\\mingw64\\bin" >> $env:GITHUB_PATH

          # Optional: confirm tools are available
          sh --version
          autoconf --version
          automake --version
          libtool --version
          gcc --version
          make --version
          pkg-config --version


          
      - name: Install dependenicesL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3 libimobiledevice libplist usbmuxd
          OPENSSL_DIR=$(brew --prefix openssl@3)
      
          echo "OPENSSL_DIR=$OPENSSL_DIR" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$OPENSSL_DIR/lib" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$OPENSSL_DIR/include" >> $GITHUB_ENV
          echo "$OPENSSL_DIR/bin" >> $GITHUB_PATH

      - name: install dependencies
        if: runner.os == 'Linux'
        run: |
          apt-get update
          apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libimobiledevice-glue-dev\
            libtatsu-dev\
            librsvg2-dev

      - name: install libimobiledevice
        if: runner.os == 'Linux'
        run: |
          apt-get -y install \
          	build-essential \
          	pkg-config \
          	checkinstall \
          	git \
          	autoconf \
          	automake \
          	libtool-bin \
          	libplist-dev \
          	libusbmuxd-dev \
          	libssl-dev \
          	usbmuxd

          git clone https://github.com/libimobiledevice/libimobiledevice.git
          cd libimobiledevice
          ./autogen.sh
          make
          make install


      - name: install frontend dependencies
        run: |
          cd frontend
          npm install -g pnpm
          pnpm install
          cd ..

          

      - uses: tauri-apps/tauri-action@v0
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          
        with:
          tagName: OpeniTools-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: 'OpeniTools v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
