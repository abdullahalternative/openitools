name: 'publish'

on:
  workflow_dispatch:

# This workflow will trigger on each push to the `release` branch to create or update a GitHub release, build your app, and upload the artifacts to the release.

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest' # for Arm based macs (M1 and above).
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest' # for Intel based macs.
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            container: kalilinux/kali-rolling
            args: ''
          - platform: 'windows-2025'
            args: ''
            
    runs-on: ${{ matrix.platform }}
    
    container: ${{ matrix.container }}
  

    steps:
      - name: Install common build deps
        if: runner.os == 'Linux'
        run: apt-get update && apt-get install -y curl build-essential pkg-config libssl-dev

      - uses: actions/checkout@v4
      
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          # cache: 'pnpm'
          

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
        
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: 'openitools'
        
      - name: Install OpenSSL (Windows via winget)
        if: runner.os == 'Windows'
        run: |
          winget install ShiningLight.OpenSSL -e --silent --accept-source-agreements --accept-package-agreements
          echo "OPENSSL_DIR=C:\\Program Files\\OpenSSL-Win64" >> $env:GITHUB_ENV
          echo "OPENSSL_LIB_DIR=C:\\Program Files\\OpenSSL-Win64\\lib" >> $env:GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=C:\\Program Files\\OpenSSL-Win64\\include" >> $env:GITHUB_ENV
          echo "$env:PATH += ';C:\\Program Files\\OpenSSL-Win64\\bin'" >> $env:GITHUB_ENV
          
      - name: Install dependenicesL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3 libimobiledevice libplist usbmuxd
          OPENSSL_DIR=$(brew --prefix openssl@3)
      
          # Export full paths for cargo/openssl-sys
          echo "OPENSSL_DIR=$OPENSSL_DIR" >> $GITHUB_ENV
          echo "OPENSSL_LIB_DIR=$OPENSSL_DIR/lib" >> $GITHUB_ENV
          echo "OPENSSL_INCLUDE_DIR=$OPENSSL_DIR/include" >> $GITHUB_ENV
          echo "$OPENSSL_DIR/bin" >> $GITHUB_PATH
      
          # Handle Intel vs M1 runners explicitly
          if [[ "$(uname -m)" == "x86_64" ]]; then
            echo "CFLAGS=-arch x86_64" >> $GITHUB_ENV
            echo "CXXFLAGS=-arch x86_64" >> $GITHUB_ENV
          else
            echo "CFLAGS=-arch arm64" >> $GITHUB_ENV
            echo "CXXFLAGS=-arch arm64" >> $GITHUB_ENV
          fi

      - name: install dependencies
        if: runner.os == 'Linux'
        run: |
          apt-get update
          apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
          apt install -y libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            libimobiledevice-glue-dev\
            libtatsu-dev\
            librsvg2-dev

      - name: install libimobiledevice
        if: runner.os == 'Linux'
        run: |
          apt-get -y install \
          	build-essential \
          	pkg-config \
          	checkinstall \
          	git \
          	autoconf \
          	automake \
          	libtool-bin \
          	libplist-dev \
          	libusbmuxd-dev \
          	libssl-dev \
          	usbmuxd

          git clone https://github.com/libimobiledevice/libimobiledevice.git
          cd libimobiledevice
          ./autogen.sh
          make
          make install


      - name: install frontend dependencies
        run: |
          cd frontend
          npm install -g pnpm
          pnpm install
          cd ..

          

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          
        with:
          tagName: OpeniTools-v__VERSION__ # the action automatically replaces \_\_VERSION\_\_ with the app version.
          releaseName: 'OpeniTools v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
